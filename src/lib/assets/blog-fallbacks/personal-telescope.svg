<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#FFB627" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Telescope tube (angled) -->
  <line x1="10" y1="12" x2="30" y2="22" />
  <line x1="10" y1="16" x2="30" y2="26" />
  <!-- Lens cap (front) -->
  <line x1="10" y1="12" x2="10" y2="16" />
  <!-- Eyepiece (back) -->
  <line x1="30" y1="22" x2="30" y2="26" />
  <!-- Finder scope (small tube on top) -->
  <line x1="18" y1="11" x2="24" y2="14" />
  <!-- Mount pivot point -->
  <circle cx="28" cy="24" r="2" />
  <!-- Tripod left leg -->
  <line x1="28" y1="26" x2="16" y2="44" />
  <!-- Tripod right leg -->
  <line x1="28" y1="26" x2="40" y2="44" />
  <!-- Tripod center leg -->
  <line x1="28" y1="26" x2="28" y2="44" />
  <!-- Tripod cross brace -->
  <line x1="20" y1="38" x2="36" y2="38" />
</svg>
