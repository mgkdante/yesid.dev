# Gitleaks config for yesid.dev monorepo.
# Extends the default ruleset (inherited from gitleaks v8 baseline) + adds an
# allowlist for known-safe CI test credentials hardcoded in workflow files.
#
# Reference: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

[extend]
useDefault = true

[allowlist]
description = "Allowlist for yesid.dev monorepo"
regexTarget = "line"

# Known-safe CI test fixtures — Directus bootstrap needs *something* for
# KEY/SECRET/ADMIN_PASSWORD even in ephemeral runs. These literals are bound
# to throwaway localhost-only containers that never touch production.
regexes = [
  # Fixed CI test KEY (16 bytes hex) — hardcoded in cms.yml + contract-test.yml
  '''ci-test-key-16-bytes-hex-aabbccdd''',
  # Fixed CI test SECRET (32 bytes hex) — hardcoded in cms.yml + contract-test.yml
  '''ci-test-secret-32-bytes-hex-aabbccddeeff''',
  # Fixed CI test ADMIN_PASSWORD — hardcoded; container destroyed post-job
  '''ci-test-pass-rotate-immediately''',
  # Slice-18 storage_asset_presets — JSON `"key": "<preset-name>"` triggers the
  # generic-api-key entropy rule (~3.66) on hyphenated preset labels. These are
  # routing identifiers for image transforms, not credentials. Closed set per
  # the Notion slice-18 conventions and 18d asset-pipeline research artifacts.
  '''hero-1200(-avif)?''',
  '''card-600(-avif)?''',
  '''thumb-240(-avif)?''',
  '''og-1200''',
]

# Paths to skip entirely (generated/vendored code, binary assets, etc.).
paths = [
  '''node_modules/''',
  '''\.svelte-kit/''',
  '''\.vercel/''',
  '''dist/''',
  '''build/''',
  '''bun\.lock''',
  # PNG/JPEG/WEBP/etc. binaries occasionally trip base64-like entropy checks.
  '''\.(png|jpg|jpeg|webp|avif|gif|ico|woff2?|ttf|otf|eot)$''',
]
