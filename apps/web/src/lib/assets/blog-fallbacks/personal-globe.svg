<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#FFB627" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Main globe circle -->
  <circle cx="24" cy="24" r="14" />
  <!-- Equator line -->
  <ellipse cx="24" cy="24" rx="14" ry="5" />
  <!-- Longitude arc (vertical) -->
  <ellipse cx="24" cy="24" rx="5" ry="14" />
  <!-- Orbit ring (tilted) -->
  <ellipse cx="24" cy="24" rx="20" ry="7" transform="rotate(-25 24 24)" />
</svg>
