<!doctype html>
<html lang="%lang%" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<!-- GO-W2.2 pre-paint theme resolution. Markup default stays dark (no-JS,
		     crawlers, OG). Synchronous + before CSSOM => zero flash on every
		     edge-cached page. localStorage choice wins; otherwise dark. -->
		<script>
			(function () {
				var d = document.documentElement, t = null;
				try { t = localStorage.getItem('theme'); } catch (e) {}
				if (t !== 'light' && t !== 'dark') {
					t = 'dark';
				}
				d.dataset.theme = t;
			})();
		</script>
		<!-- go2/w5 pre-paint hero-intro resolution. If the visitor already scrolled
		     the intro through TODAY ('yesid:hero-intro-day' = local YYYY-MM-DD), mark
		     the document so the hero renders COLLAPSED from the first frame — no flash
		     of the 900svh metro intro before onMount collapses it. Synchronous +
		     before CSSOM, exactly like the theme script above. -->
		<script>
			(function () {
				try {
					var n = new Date();
					var today =
						n.getFullYear() +
						'-' +
						String(n.getMonth() + 1).padStart(2, '0') +
						'-' +
						String(n.getDate()).padStart(2, '0');
					if (localStorage.getItem('yesid:hero-intro-day') === today) {
						document.documentElement.dataset.heroIntroDone = '1';
					}
				} catch (e) {}
			})();
		</script>
		<!-- Fonts: self-hosted via @fontsource-variable (no external requests) -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
