	<rect x="1206" y="232" width="32" height="248" rx="3" stroke="#E07800" stroke-width="1.5" stroke-dasharray="5 2"/>
	<line x1="1203" y1="232" x2="1203" y2="480" stroke="#E07800" stroke-width="0.5" stroke-dasharray="2 2"/>
