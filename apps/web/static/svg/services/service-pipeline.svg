<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Source node: hollow circle -->
  <circle cx="8" cy="24" r="5" stroke="var(--primary)" stroke-width="1.5" fill="none"/>
  <!-- Source inner dot -->
  <circle cx="8" cy="24" r="2" fill="var(--primary)40"/>
  <!-- Connection line: source to transform -->
  <line x1="13" y1="24" x2="17" y2="24" stroke="var(--accent)" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Dot marker between source and transform -->
  <circle cx="15" cy="24" r="1" fill="var(--accent)"/>
  <!-- Transform node: rounded rect -->
  <rect x="17" y="18" width="14" height="12" rx="3" stroke="var(--primary)" stroke-width="1.5" fill="none"/>
  <!-- Transform inner accent -->
  <rect x="20" y="21" width="8" height="6" rx="1.5" fill="var(--primary)15"/>
  <!-- Arrow inside transform -->
  <polyline points="22,23 24,25 26,23" stroke="var(--accent)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Connection line: transform to destination -->
  <line x1="31" y1="24" x2="35" y2="24" stroke="var(--accent)" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Dot marker between transform and destination -->
  <circle cx="33" cy="24" r="1" fill="var(--accent)"/>
  <!-- Destination node: filled circle -->
  <circle cx="40" cy="24" r="5" stroke="var(--primary)" stroke-width="1.5" fill="none"/>
  <!-- Destination inner fill -->
  <circle cx="40" cy="24" r="3" fill="var(--primary)40"/>
</svg>
