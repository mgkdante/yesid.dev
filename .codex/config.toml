# yesid.dev — workflow-overlord v2 Codex CLI config.
#
# Hook dispatchers live in the GLOBAL ~/.codex/config.toml — they `cd` into
# the project root and exec `<root>/.codex/hooks/<event>.sh`. Redeclaring the
# same hooks here causes Codex to register them TWICE (global + project), so
# every SessionStart fired two parallel dispatcher processes and produced
# duplicate Sessions rows. v2.1.3 also added per-session file locking as a
# belt-and-suspenders defense, but the right primary fix is "one place
# registers each hook." Keep the [features] block only.

[features]
hooks = true
remote_connections = true
suppress_unstable_features_warning = true