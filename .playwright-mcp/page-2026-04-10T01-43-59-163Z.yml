      - generic [ref=e1097]:
        - generic [ref=e1101]: Got questions?
        - generic [ref=e1104]:
          - generic [ref=e1106] [cursor=pointer]:
            - paragraph [ref=e1109]: I still don't get it. What is Front Yard?
            - paragraph [ref=e1121]: "Front Yard is a design studio focused on product marketing. We help companies clarify their storytelling and turn it into clear, quality creative. Said \"creative\" can take the form of branding, websites, videos, decks, and more, but the underlying goal is always the same: make it easier for people to understand what you’re building and why it matters."
          - generic [ref=e1123] [cursor=pointer]:
            - paragraph [ref=e1126]: Who do we typically work with?
            - paragraph [ref=e1138]: We're industry-agnostic, and mostly work with founders and teams at growing companies. Often they’re at a point where the product has evolved, the company has grown, or the audience has shifted, and the existing story or creative needs to level up.
          - generic [ref=e1140] [cursor=pointer]:
            - paragraph [ref=e1143]: Do you only work with tech companies?
            - paragraph [ref=e1155]: No, we're very much industry-agnostic. We've partnered with organizations in hospitality, non-profits, healthcare, tech, and more. Good design creates value regardless of sector.
          - generic [ref=e1157] [cursor=pointer]:
            - paragraph [ref=e1160]: Do we work with early-stage startups and businesses?
            - paragraph [ref=e1172]: For sure. Some of our best work has been with fresh startups that need help articulating what they're building before they go to market. If you've got a business/product and need to explain it clearly to customers, investors, or partners, we can help.
          - generic [ref=e1174] [cursor=pointer]:
            - paragraph [ref=e1177]: How much does it cost to work with Front Yard?
            - paragraph [ref=e1189]: We scope projects individually after we learn about your specific requirements and goals, with a minimum project engagement of $6000. Or, you can also engage with us on a retainer basis, which starts at $5k/mo and gives you access to our full range of services.
          - generic [ref=e1191] [cursor=pointer]:
            - paragraph [ref=e1194]: What makes our approach different?
            - paragraph [ref=e1206]: "Everything we do comes back to one thing: clarity of communication. We distill complex products and brands down to their essence - what they do, why it matters, and how they help. No jargon or fluff."
          - generic [ref=e1208] [cursor=pointer]:
            - paragraph [ref=e1211]: What do we think about AI?
            - paragraph [ref=e1223]: It's cool (environmental/ethical issues nonwithstanding). Will say this - it's not better than us, but in some instances it helps us do better work. And if one day it is better than us, we'll close up shop.
          - generic [ref=e1225] [cursor=pointer]:
            - paragraph [ref=e1228]: Why should I hire Front Yard over freelancers?
            - paragraph [ref=e1240]: Freelancers can obviously be great, especially for specific jobs. However, an agency like Front Yard gives you a full team with diverse expertise - strategy, design, development, project management - all collaborating under one system. You get consistent availability, quality control, and the capacity to scale quickly. With freelancers, you're often coordinating multiple people yourself, which can slow things down and create gaps in accountability and output quality.
          - generic [ref=e1242] [cursor=pointer]:
            - paragraph [ref=e1245]: Why'd we name ourselves "Front Yard"?
            - paragraph [ref=e1257]: Passing by an interesting yard makes you want to know more about the homeowner. Great product marketing achieves something similar, except for your brand. (Also, the name was available.)
          - generic [ref=e1259] [cursor=pointer]:
            - paragraph [ref=e1262]: Do we do lawn care?
            - paragraph [ref=e1274]: Unfortunately no
