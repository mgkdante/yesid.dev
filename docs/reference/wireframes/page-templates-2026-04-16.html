<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yesid.dev — Page Template Wireframes</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #e8e8e6;
    --muted: #888;
    --orange: #E07800;
    --yellow: #FFB627;
    --blue: #4a9eff;
    --green: #4ade80;
    --purple: #a78bfa;
    --pink: #f472b6;
    --grid-line: rgba(224, 120, 0, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    padding: 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  h1 span { color: var(--orange); }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 24px;
  }

  /* Template tabs */
  .template-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .template-tab {
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .template-tab:hover { border-color: var(--orange); color: var(--text); }
  .template-tab.active {
    background: var(--orange);
    color: #000;
    border-color: var(--orange);
    font-weight: 700;
  }

  /* Breakpoint toggle */
  .bp-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .bp-btn {
    padding: 6px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .bp-btn:hover { border-color: var(--orange); }
  .bp-btn.active { background: var(--orange); color: #000; border-color: var(--orange); font-weight: 700; }

  /* Wireframe container */
  .wireframe-area {
    display: flex;
    justify-content: center;
    padding: 16px 0;
  }
  .wireframe {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
    position: relative;
  }
  .wireframe.mobile { width: 375px; }
  .wireframe.tablet { width: 768px; }
  .wireframe.desktop { width: 1200px; }

  /* Grid cells */
  .cell {
    border: 1px dashed var(--grid-line);
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 48px;
    position: relative;
  }
  .cell-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--orange);
    font-weight: 600;
  }
  .cell-desc {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cell-recipe {
    position: absolute;
    top: 4px;
    right: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--purple);
    opacity: 0.7;
  }

  /* Color coding */
  .cell-hero { background: rgba(224, 120, 0, 0.08); }
  .cell-nav { background: rgba(74, 158, 255, 0.08); }
  .cell-sidebar { background: rgba(167, 139, 250, 0.08); }
  .cell-content { background: rgba(74, 222, 128, 0.08); }
  .cell-footer { background: rgba(136, 136, 136, 0.08); }
  .cell-edge { background: rgba(255, 182, 39, 0.08); }
  .cell-bg { background: rgba(244, 114, 182, 0.06); border-style: dotted; }
  .cell-hidden { opacity: 0.25; border-style: dotted; }

  /* Grid shorthand annotation */
  .grid-anno {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--blue);
    padding: 4px 8px;
    background: rgba(74, 158, 255, 0.06);
    border-bottom: 1px solid var(--border);
  }

  /* Section divider */
  .section-sep {
    height: 4px;
    background: repeating-linear-gradient(135deg, var(--orange) 0, var(--orange) 4px, transparent 4px, transparent 8px);
    opacity: 0.4;
  }

  /* Info panel */
  .info {
    margin-top: 16px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-width: 1200px;
    margin-inline: auto;
  }
  .info h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--orange);
  }
  .info p, .info li {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .info code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: rgba(224, 120, 0, 0.1);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--orange);
  }
  .info ul { padding-left: 20px; margin-top: 6px; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 1px dashed var(--grid-line);
  }

  .page { display: none; }
  .page.active { display: block; }
</style>
</head>

const breakpoints = [
  { id: 'mobile', label: '375px Mobile', width: 375 },
  { id: 'tablet', label: '768px Tablet', width: 768 },
  { id: 'desktop', label: '1440px Desktop', width: 1200 },
];

let activeTemplate = 'home';
let activeBp = 'desktop';

function render() {
  // Tabs
  document.getElementById('tabs').innerHTML = templates.map(t =>
    `<button class="template-tab ${t.id === activeTemplate ? 'active' : ''}" onclick="selectTemplate('${t.id}')">${t.label}</button>`
  ).join('');

  // BP toggle
  document.getElementById('bpToggle').innerHTML = breakpoints.map(bp =>
    `<button class="bp-btn ${bp.id === activeBp ? 'active' : ''}" onclick="selectBp('${bp.id}')">${bp.label}</button>`
  ).join('');

  // Content
  const t = templates.find(t => t.id === activeTemplate);
  const bp = breakpoints.find(b => b.id === activeBp);
  const content = t[activeBp];

  document.getElementById('pages').innerHTML = `
    <div class="wireframe-area">
      <div class="wireframe ${activeBp}" style="max-width:${bp.width}px">
        ${content}
      </div>
    </div>
    <div class="info">
      <h3>${t.route} — ${t.recipe}</h3>
      <ul>${t.notes.map(n => `<li>${n}</li>`).join('')}</ul>
    </div>
  `;
}

function selectTemplate(id) { activeTemplate = id; render(); }
function selectBp(id) { activeBp = id; render(); }

render();
</script>
