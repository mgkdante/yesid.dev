<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Morph Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #f0f0f0; font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; }
  h1 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #555; }
  .morph-container { width: 500px; height: 500px; border: 1px solid #222; border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; background: #111; }
  .morph-container:hover { border-color: #E07800; }
  .morph-svg { width: 100%; height: 100%; }
  .label { font-size: 12px; color: #444; letter-spacing: 1px; }
  .controls { display: flex; gap: 16px; align-items: center; }
  .controls button { background: none; border: 1px solid #333; color: #888; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .controls button:hover { border-color: #E07800; color: #E07800; }
  .controls button.active { border-color: #FFB627; color: #FFB627; }
</style>
</head>
<body>

<h1>SVG Morph Testbed</h1>
<p class="label">Hover to morph &middot; Click to toggle &middot; Reusable template</p>

<div class="morph-container" id="morph-stage">
  <!-- Both SVGs inlined here, train hidden initially -->
  <svg class="morph-svg" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- ROCKET paths (visible by default) — centered in viewBox -->
    <g id="rocket-group" transform="translate(300,100) scale(4)">
    </g>
    <!-- TRAIN paths (hidden, morph targets only — transform irrelevant) -->
    <g id="train-group" style="visibility:hidden">
    </g>
  </svg>
</div>

<div class="controls">
  <button id="btn-rocket" class="active">Rocket</button>
  <button id="btn-train">Train</button>
  <span class="label" id="state-label">showing: rocket</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/MorphSVGPlugin.min.js"></script>
<script>
/**
 * SVG Morph Testbed — reusable template
 * ──────────────────────────────────────
 * CONFIG: edit the `pairs` array to define morph mappings.
 * Each entry: { from: '#rocket-id', to: '#train-id' }
 * Unpaired elements fade in/out via the `rocketOnly` / `trainOnly` arrays.
 */

// ── Load both SVGs inline ──
async function loadSVGPaths(url, targetGroupId) {
  const res = await fetch(url);
  const text = await res.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  const sourceGroup = svg.querySelector('g');

  const targetGroup = document.getElementById(targetGroupId);
  // Don't copy source transform — both groups share a unified transform
  // so morph works correctly across coordinate spaces
  // Move all children
  if (sourceGroup) {
    Array.from(sourceGroup.children).forEach(child => {
      targetGroup.appendChild(document.adoptNode(child));
    });
  }
}

// ── Morph pair config ──
const pairs = [
  { from: '#r-body',    to: '#t-body' },
  { from: '#r-window',  to: '#t-window' },
  { from: '#r-fin-l',   to: '#t-bogie-f' },
  { from: '#r-fin-r',   to: '#t-bogie-r' },
  { from: '#r-hazard',  to: '#t-hazard' },
  { from: '#r-band',    to: '#t-skirt' },
  { from: '#r-engine',  to: '#t-coupling' },
  { from: '#r-nose',    to: '#t-door-1' },
  { from: '#r-upper',   to: '#t-door-2' },
  { from: '#r-stripe',  to: '#t-roof' },
  { from: '#r-antenna', to: '#t-panto-strip' },
];

let isRocket = true;
let morphTl = null;

// Position presets — rocket centered, train at bottom row
const ROCKET_POS = { tx: 300, ty: 100 };
const TRAIN_POS  = { tx: -6,  ty: 400 };
const groupPos = { tx: ROCKET_POS.tx, ty: ROCKET_POS.ty };

function applyGroupTransform() {
  document.getElementById('rocket-group')
    .setAttribute('transform', `translate(${groupPos.tx},${groupPos.ty}) scale(4)`);
}

function buildMorphTimeline(toTrain) {
  if (morphTl) morphTl.kill();

  const tl = gsap.timeline({ defaults: { duration: 1.2, ease: 'power2.inOut' } });

  // Animate group position: center ↔ bottom row
  const target = toTrain ? TRAIN_POS : ROCKET_POS;
  tl.to(groupPos, { tx: target.tx, ty: target.ty, onUpdate: applyGroupTransform }, 0);

  // Morph paired paths
  pairs.forEach(pair => {
    const from = document.querySelector(pair.from);
    const to = document.querySelector(pair.to);
    if (!from || !to) return;

    if (toTrain) {
      tl.to(from, { morphSVG: to, fill: getComputedFill(to) }, 0);
    } else {
      // Reverse: morph back to original (stored in data attr)
      tl.to(from, { morphSVG: from.dataset.originalD, fill: from.dataset.originalFill }, 0);
    }
  });

  // Fade unpaired rocket elements
  const rocketGroup = document.getElementById('rocket-group');
  const pairedFromIds = pairs.map(p => p.from.replace('#', ''));
  Array.from(rocketGroup.querySelectorAll('path, circle, line, rect')).forEach(el => {
    if (!pairedFromIds.includes(el.id)) {
      tl.to(el, { opacity: toTrain ? 0 : (el.dataset.originalOpacity || 1), duration: 0.6 }, 0);
    }
  });

  morphTl = tl;
  return tl;
}

function getComputedFill(el) {
  return el.getAttribute('fill') || 'none';
}

function storeOriginals() {
  pairs.forEach(pair => {
    const from = document.querySelector(pair.from);
    if (from) {
      from.dataset.originalD = from.getAttribute('d');
      from.dataset.originalFill = from.getAttribute('fill') || 'none';
    }
  });
  // Store original opacity for all rocket elements
  const rocketGroup = document.getElementById('rocket-group');
  Array.from(rocketGroup.querySelectorAll('path, circle, line, rect')).forEach(el => {
    el.dataset.originalOpacity = el.getAttribute('opacity') || '1';
  });
}

// ── Init ──
Promise.all([
  loadSVGPaths('/svg/graffiti/prop-rocket.svg', 'rocket-group'),
  loadSVGPaths('/svg/graffiti/prop-train.svg', 'train-group'),
]).then(() => {
  gsap.registerPlugin(MorphSVGPlugin);
  storeOriginals();

  const stage = document.getElementById('morph-stage');
  const label = document.getElementById('state-label');
  const btnRocket = document.getElementById('btn-rocket');
  const btnTrain = document.getElementById('btn-train');

  // Hover: morph to train
  stage.addEventListener('mouseenter', () => {
    if (isRocket) {
      buildMorphTimeline(true);
      label.textContent = 'morphing → train';
    }
  });

  // Leave: morph back to rocket
  stage.addEventListener('mouseleave', () => {
    if (isRocket) {
      buildMorphTimeline(false);
      label.textContent = 'morphing → rocket';
    }
  });

  // Click: toggle permanently
  stage.addEventListener('click', () => {
    isRocket = !isRocket;
    buildMorphTimeline(!isRocket);
    label.textContent = `showing: ${isRocket ? 'rocket' : 'train'}`;
    btnRocket.classList.toggle('active', isRocket);
    btnTrain.classList.toggle('active', !isRocket);
  });

  btnRocket.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!isRocket) { isRocket = true; buildMorphTimeline(false); }
    label.textContent = 'showing: rocket';
    btnRocket.classList.add('active');
    btnTrain.classList.remove('active');
  });

  btnTrain.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isRocket) { isRocket = false; buildMorphTimeline(true); }
    label.textContent = 'showing: train';
    btnTrain.classList.add('active');
    btnRocket.classList.remove('active');
  });
});
</script>
</body>
</html>
