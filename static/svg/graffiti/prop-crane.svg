<svg xmlns="http://www.w3.org/2000/svg" viewBox="24 0 352 180" fill="none">
  <!-- Construction Tower Crane — wide boom to span card grid -->

  <!-- Tower (vertical mast) -->
  <path d="M52,22 L62,22 L62,168 L52,168 Z" fill="#FFB627"/>
  <!-- Tower lattice cross-bracing -->
  <path d="M52,28 L62,42 M62,28 L52,42" stroke="#111" stroke-width="1.5"/>
  <path d="M52,42 L62,56 M62,42 L52,56" stroke="#111" stroke-width="1.5"/>
  <path d="M52,56 L62,70 M62,56 L52,70" stroke="#111" stroke-width="1.5"/>
  <path d="M52,70 L62,84 M62,70 L52,84" stroke="#111" stroke-width="1.5"/>
  <path d="M52,84 L62,98 M62,84 L52,98" stroke="#111" stroke-width="1.5"/>
  <path d="M52,98 L62,112 M62,98 L52,112" stroke="#111" stroke-width="1.5"/>
  <path d="M52,112 L62,126 M62,112 L52,126" stroke="#111" stroke-width="1.5"/>
  <path d="M52,126 L62,140 M62,126 L52,140" stroke="#111" stroke-width="1.5"/>
  <path d="M52,140 L62,154 M62,140 L52,154" stroke="#111" stroke-width="1.5"/>
  <path d="M52,154 L62,168 M62,154 L52,168" stroke="#111" stroke-width="1.5"/>

  <!-- Turntable / slewing ring -->
  <path d="M48,18 L66,18 L66,26 L48,26 Z" fill="#333" rx="2"/>

  <!-- Jib (horizontal boom arm — extends far right over cards) -->
  <path d="M24,16 L370,16 L372,22 L24,22 Z" fill="#FFB627"/>
  <!-- Jib lattice lines -->
  <path d="M30,16 L38,22 M42,16 L50,22 M54,16 L62,22 M66,16 L74,22 M78,16 L86,22 M90,16 L98,22 M102,16 L110,22 M114,16 L122,22 M126,16 L134,22 M138,16 L146,22" stroke="#111" stroke-width="1.5"/>
  <path d="M150,16 L158,22 M162,16 L170,22 M174,16 L182,22 M186,16 L194,22 M198,16 L206,22 M210,16 L218,22 M222,16 L230,22 M234,16 L242,22 M246,16 L254,22 M258,16 L266,22" stroke="#111" stroke-width="1.5"/>
  <path d="M270,16 L278,22 M282,16 L290,22 M294,16 L302,22 M306,16 L314,22 M318,16 L326,22 M330,16 L338,22 M342,16 L350,22 M354,16 L362,22" stroke="#111" stroke-width="1.5"/>
  <!-- Jib top rail -->
  <path d="M24,14 L372,14 L372,16 L24,16 Z" fill="#E6A020"/>

  <!-- Counter-jib (short arm left — compact) -->
  <path d="M30,16 L48,16 L48,22 L32,22 Z" fill="#FFB627"/>
  <path d="M34,16 L40,22 M42,16 L48,22" stroke="#111" stroke-width="1.5"/>
  <!-- Counterweight -->
  <path d="M28,22 L40,22 L40,32 L30,32 Z" fill="#333"/>
  <path d="M30,24 L38,24 L38,30 L32,30 Z" fill="#222"/>

  <!-- Cab -->
  <path d="M64,22 L82,22 L82,42 L64,42 Z" fill="#FFB627"/>
  <path d="M66,24 L80,24 L80,34 L66,34 Z" fill="#87CEEB" opacity="0.6"/>
  <path d="M66,34 L80,34 L80,40 L66,40 Z" fill="#E6A020"/>
  <path d="M66,24 L80,24 L80,34 L66,34 Z" stroke="#111" stroke-width="1" fill="none"/>
  <path d="M73,24 L73,34" stroke="#111" stroke-width="0.8"/>

  <!-- Pendant lines (cables from tower top to jib tip) -->
  <path d="M57,14 L32,14" stroke="#333" stroke-width="1.2"/>
  <path d="M57,14 L368,10" stroke="#333" stroke-width="1"/>
  <!-- Jib tie (A-frame) -->
  <path d="M57,2 L57,14" stroke="#333" stroke-width="2"/>
  <path d="M57,2 L368,14" stroke="#333" stroke-width="0.8"/>
  <path d="M57,2 L32,14" stroke="#333" stroke-width="1"/>

  <!-- Trolley (on jib, positioned over 2nd card area) -->
  <rect x="260" y="13" width="10" height="5" rx="1" fill="#666"/>

  <!-- Hook cable -->
  <path d="M265,18 L265,80" stroke="#333" stroke-width="1.5"/>
  <!-- Hook block -->
  <path d="M261,78 L269,78 L269,86 L261,86 Z" fill="#333"/>
  <!-- Hook -->
  <path d="M265,86 L265,96 Q265,102 259,102 Q253,102 253,96" stroke="#FFB627" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Base -->
  <path d="M38,168 L76,168 L80,176 L34,176 Z" fill="#333"/>
  <path d="M30,176 L84,176 L84,180 L30,180 Z" fill="#222"/>
  <!-- Hazard stripes on base -->
  <path d="M40,170 L46,176 M48,170 L54,176 M56,170 L62,176 M64,170 L70,176" stroke="#FFB627" stroke-width="1.5"/>
</svg>
