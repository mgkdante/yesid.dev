<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Baseline -->
  <line x1="8" y1="40" x2="40" y2="40" stroke="#E0780040" stroke-width="1"/>
  <!-- Bar 1 (short) -->
  <rect x="11" y="28" width="6" height="12" rx="1" stroke="#E07800" stroke-width="1.5" fill="none"/>
  <rect x="11" y="28" width="6" height="12" rx="1" fill="#E0780015"/>
  <!-- Bar 2 (medium) -->
  <rect x="21" y="20" width="6" height="20" rx="1" stroke="#E07800" stroke-width="1.5" fill="none"/>
  <rect x="21" y="20" width="6" height="20" rx="1" fill="#E0780015"/>
  <!-- Bar 3 (tall) -->
  <rect x="31" y="12" width="6" height="28" rx="1" stroke="#E07800" stroke-width="1.5" fill="none"/>
  <rect x="31" y="12" width="6" height="28" rx="1" fill="#E0780015"/>
  <!-- Trend line going up-right -->
  <polyline points="14,26 24,18 34,10" stroke="#FFB627" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend endpoint circle -->
  <circle cx="34" cy="10" r="2" stroke="#FFB627" stroke-width="1" fill="none"/>
  <circle cx="34" cy="10" r="1" fill="#FFB62740"/>
</svg>
