<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- App window frame -->
  <rect x="4" y="4" width="40" height="40" rx="3" stroke="#E07800" stroke-width="1.5" fill="none"/>
  <!-- Title bar divider -->
  <line x1="4" y1="13" x2="44" y2="13" stroke="#E07800" stroke-width="1"/>
  <!-- Window dot 1 (close) -->
  <circle cx="10" cy="8.5" r="1.5" stroke="#E07800" stroke-width="1" fill="none"/>
  <!-- Window dot 2 (minimize) -->
  <circle cx="15" cy="8.5" r="1.5" stroke="#FFB627" stroke-width="1" fill="none"/>
  <!-- Window dot 3 (maximize) -->
  <circle cx="20" cy="8.5" r="1.5" stroke="#FFB627" stroke-width="1" fill="none"/>
  <!-- UI form element: label bar -->
  <rect x="8" y="17" width="14" height="3" rx="1" fill="#E0780040"/>
  <!-- UI form element: input field -->
  <rect x="8" y="23" width="32" height="5" rx="1.5" stroke="#E07800" stroke-width="1" fill="none"/>
  <!-- UI form element: second label -->
  <rect x="8" y="31" width="10" height="3" rx="1" fill="#E0780040"/>
  <!-- UI form element: button -->
  <rect x="8" y="37" width="16" height="4" rx="1.5" stroke="#FFB627" stroke-width="1.2" fill="none"/>
  <rect x="8" y="37" width="16" height="4" rx="1.5" fill="#FFB62715"/>
</svg>
