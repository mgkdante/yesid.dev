<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Monitor frame -->
  <rect x="4" y="4" width="40" height="30" rx="3" stroke="#E07800" stroke-width="1.5" fill="none"/>
  <!-- Title bar divider -->
  <line x1="4" y1="11" x2="44" y2="11" stroke="#E07800" stroke-width="1"/>
  <!-- Browser dot 1 -->
  <circle cx="9" cy="7.5" r="1.5" stroke="#E07800" stroke-width="1" fill="none"/>
  <!-- Browser dot 2 -->
  <circle cx="14" cy="7.5" r="1.5" stroke="#FFB627" stroke-width="1" fill="none"/>
  <!-- Browser dot 3 -->
  <circle cx="19" cy="7.5" r="1.5" stroke="#FFB627" stroke-width="1" fill="none"/>
  <!-- Sidebar panel -->
  <rect x="7" y="14" width="10" height="17" rx="1.5" stroke="#E07800" stroke-width="1" fill="none"/>
  <rect x="7" y="14" width="10" height="17" rx="1.5" fill="#E0780015"/>
  <!-- Content area -->
  <rect x="20" y="14" width="21" height="17" rx="1.5" stroke="#FFB627" stroke-width="1" fill="none"/>
  <rect x="20" y="14" width="21" height="17" rx="1.5" fill="#FFB62715"/>
  <!-- Stand neck -->
  <line x1="24" y1="34" x2="24" y2="39" stroke="#E07800" stroke-width="1.5"/>
  <!-- Stand base -->
  <line x1="18" y1="39" x2="30" y2="39" stroke="#E07800" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Content lines inside content area for visual detail -->
  <line x1="23" y1="18" x2="38" y2="18" stroke="#FFB62740" stroke-width="1"/>
  <line x1="23" y1="22" x2="35" y2="22" stroke="#FFB62740" stroke-width="1"/>
</svg>
