name: web

# CI for apps/web (SvelteKit consumer deployed to Vercel).
# Runs check + test + build via turbo on EVERY PR/push to main+develop.
#
# slice-17f Phase 7: shared setup extracted to .github/actions/setup
# (Bun + cache restores + install). concurrency cancel-in-progress on
# pull_request kills duplicate runs on force-push / fast follow-up commits.
#
# slice-17f Phase 8: path filters removed. Reason: this workflow is now a
# REQUIRED status check on the main branch ruleset. Path-filtered workflows
# don't run on excluded paths → the required check never reports → docs-only
# PRs would be blocked forever. With the Phase 7 caches, cost on no-op runs
# is ~20-30s end-to-end (FULL TURBO cache replay), so always-run is fine.
#
# E2E (Playwright) now RUNS in CI as a separate `e2e` job (FR go-live / launch
# roadmap #3 — supersedes the slice-28.4 manual-only decision now that deploys
# carry FR + motion/visual surface area). Hermetic: the suite builds + serves a
# local preview against the committed .ts (EXPORT_FALLBACKS_SKIP=1, no live CMS).
# All four projects are Chromium (WebKit deps unavailable on Linux), so only the
# chromium browser is installed. To target a deployed surface instead, run
# locally with PLAYWRIGHT_BASE_URL=<url> bun run test:e2e from apps/web.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress duplicate runs on PR pushes; let main/develop pushes
# complete (we want every main commit to have a recorded build).
concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Type check (svelte-kit sync + svelte-check)
        run: bun x turbo run check --filter=@repo/web

      - name: Unit tests
        run: bun x turbo run test --filter=@repo/web

      - name: Token drift + packages tests (slice-28.4, audit #81/#94/#60)
        # ci:tokens regenerates the token build outputs and fails on diff vs
        # the committed files; the package suites cover packages/tokens
        # (vitest) and packages/shared (bun test) which the turbo @repo/web
        # filter above never reaches.
        run: bun run ci:tokens && bun run --cwd packages/tokens test && bun run --cwd packages/shared test

      - name: Build
        env:
          # Hermetic CI build (slice-28.4, audit #137): skip the
          # export-fallbacks prebuild — the committed content modules are the
          # content source and CI must not reach a live CMS. Declared in
          # turbo.json build env so turbo strict mode forwards it.
          EXPORT_FALLBACKS_SKIP: '1'
        run: bun x turbo run build --filter=@repo/web

  # ── E2E (Playwright) against the DEPLOYED Vercel PREVIEW ──────────────────
  # Three jobs, so the suite SCALES: resolve the preview URL ONCE, fan the run
  # out across a shard MATRIX (each runner hits the edge independently), then
  # merge the per-shard blob reports into one HTML report. Adding tests never
  # grows wall-clock — bump SHARD_TOTAL. Targeting the real preview (not a
  # hermetic build) sidesteps the @resvg/resvg-js native-binary gap, the
  # /projects SSR 500 and sub-pixel font drift; canonical/hreflang asserts are
  # host-independent (SITE_HOST is hardcoded) so they hold on the preview host.

  # 1) Resolve the preview URL once. Tiny job (just the Deployments API poll) —
  #    its output feeds every shard, so we don't poll N times.
  e2e-preview:
    runs-on: ubuntu-latest
    # The Deployments API (where Vercel posts the preview URL) is not readable by
    # the default contents-only GITHUB_TOKEN → 403 without this grant.
    permissions:
      contents: read
      deployments: read
    outputs:
      url: ${{ steps.preview.outputs.url }}
    steps:
      - name: Resolve the Vercel preview URL (wait for the deploy)
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request?.head?.sha ?? context.sha;
            core.info(`Waiting for a Vercel preview deployment for ${sha}…`);
            const deadline = Date.now() + 12 * 60 * 1000;
            // Resilient poll: a transient API hiccup must not kill the wait.
            while (Date.now() < deadline) {
              try {
                const { data: deployments } = await github.rest.repos.listDeployments({
                  owner: context.repo.owner, repo: context.repo.repo, sha, per_page: 30,
                });
                for (const d of deployments) {
                  const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                    owner: context.repo.owner, repo: context.repo.repo, deployment_id: d.id, per_page: 30,
                  });
                  const ok = statuses.find((s) => s.state === 'success' && s.environment_url);
                  if (ok) {
                    core.info(`preview ready: ${ok.environment_url}`);
                    core.setOutput('url', ok.environment_url);
                    return;
                  }
                  if (statuses.some((s) => ['failure', 'error'].includes(s.state))) {
                    core.warning(`a deployment for ${sha} reported failure; still polling for a good one`);
                  }
                }
              } catch (err) {
                core.warning(`deployments poll errored (${err.status ?? ''} ${err.message}); retrying`);
              }
              await new Promise((r) => setTimeout(r, 15000));
            }
            core.setFailed(`No successful Vercel preview deployment found for ${sha} within 12m`);

  # 2) Run the suite, sharded across the matrix. fail-fast:false so one red shard
  #    doesn't kill the others. Each shard emits a blob report artifact.
  e2e:
    needs: e2e-preview
    runs-on: ubuntu-latest
    # NON-BLOCKING during shake-out. To make it a hard gate: drop this, drop it
    # on e2e-report, and add `e2e-report` to the branch ruleset.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # SHARD_TOTAL = length of this list. Bump both to scale.
        shard: [1, 2, 3, 4]
    env:
      SHARD_TOTAL: 4
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Install Playwright Chromium (+ system deps)
        working-directory: apps/web
        run: bun x playwright install --with-deps chromium

      - name: Playwright e2e shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }}
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.e2e-preview.outputs.url }}
          # Preview deployments are behind Vercel Deployment Protection (SSO 401);
          # this Protection Bypass for Automation secret lets the suite through.
          # Without it every test times out on the Vercel login wall.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          # Per-shard parallelism: the preview edge is horizontally scalable, so
          # workers hit it concurrently. 4 × 4 shards = 16 concurrent — plenty,
          # without a serverless thundering herd on /api/weather, og, sitemap.
          PLAYWRIGHT_WORKERS: 4
        run: bun x playwright test --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }} --reporter=blob

      - name: Upload blob report (shard ${{ matrix.shard }})
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: apps/web/blob-report/
          retention-days: 7

  # 3) Merge the per-shard blob reports into one HTML report. Runs even if a
  #    shard failed, so the report is always complete.
  e2e-report:
    needs: e2e
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Download all shard blob reports
        uses: actions/download-artifact@v4
        with:
          path: apps/web/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into one HTML report
        working-directory: apps/web
        run: bun x playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: apps/web/playwright-report/
          retention-days: 14
