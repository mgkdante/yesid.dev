name: web

# CI for apps/web (SvelteKit consumer deployed to Vercel).
# Runs check + test + build via turbo. Filters to apps/web + packages/shared
# changes; skips on cms-only changes.
#
# slice-17f Phase 7: shared setup extracted to .github/actions/setup
# (Bun + cache restores + install). concurrency cancel-in-progress on
# pull_request kills duplicate runs on force-push / fast follow-up commits.

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      # slice-18k Phase 8 Codex final fix #3: web prebuild runs
      # apps/cms/scripts/export-fallbacks.ts which imports from
      # apps/cms/scripts/lib/* (emitters, fetchers, helpers). PRs touching
      # only the CMS export pipeline can break @repo/web builds without
      # web.yml running otherwise.
      - 'apps/cms/scripts/**'
      - 'packages/shared/**'
      - '.github/workflows/web.yml'
      - '.github/actions/setup/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'apps/cms/scripts/**'
      - 'packages/shared/**'
      - '.github/workflows/web.yml'
      - '.github/actions/setup/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'

# Cancel in-progress duplicate runs on PR pushes; let main/develop pushes
# complete (we want every main commit to have a recorded build).
concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Type check (svelte-kit sync + svelte-check)
        run: bun x turbo run check --filter=@repo/web

      - name: Unit tests
        run: bun x turbo run test --filter=@repo/web

      - name: Build
        run: bun x turbo run build --filter=@repo/web
