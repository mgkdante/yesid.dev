name: web

# CI for apps/web (SvelteKit consumer deployed to Vercel).
# Runs check + test + build via turbo on EVERY PR to main+develop (PR-only;
# the redundant post-merge push run was dropped to cut cost).
#
# slice-17f Phase 7: shared setup extracted to .github/actions/setup
# (Bun + cache restores + install). concurrency cancel-in-progress on
# pull_request kills duplicate runs on force-push / fast follow-up commits.
#
# slice-17f Phase 8: path filters removed. Reason: this workflow is now a
# REQUIRED status check on the main branch ruleset. Path-filtered workflows
# don't run on excluded paths → the required check never reports → docs-only
# PRs would be blocked forever. With the Phase 7 caches, cost on no-op runs
# is ~20-30s end-to-end (FULL TURBO cache replay), so always-run is fine.
#
# E2E (Playwright) runs on pull_request only, against a LOCAL hermetic preview
# on the runner — zero Vercel edge requests — and is further gated by the
# `skip-e2e` PR label (build + 3 shards is the costly part). The cheap `ci` job
# (type check, unit tests, token drift, package tests, build) runs on every PR.

on:
  # PR-only (no push: trigger). The PR run is the gate that blocks a bad merge;
  # re-running the same checks on the post-merge push to develop/main is
  # redundant and pure cost, so it was dropped (2026-06-19, cost cut).
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress duplicate runs on PR pushes (force-push / fast follow-ups).
concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Turbo Remote Cache: when TURBO_TOKEN (a Vercel access token) and TURBO_TEAM
# (the Vercel team slug) are set as a repo secret + variable, `turbo run` shares
# a content-addressed cache across every run/branch/PR, so check/test/build go
# near-instant on unchanged inputs (even on a fresh PR). Empty values degrade
# gracefully to the local .turbo/cache. One-time setup: `bunx turbo login &&
# bunx turbo link`, then add the TURBO_TOKEN secret + TURBO_TEAM variable.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Type check (svelte-kit sync + svelte-check)
        run: bun x turbo run check --filter=@repo/web

      - name: Unit tests
        run: bun x turbo run test --filter=@repo/web

      - name: Token drift + packages tests (slice-28.4, audit #81/#94/#60)
        # ci:tokens regenerates the token build outputs and fails on diff vs
        # the committed files; the package suites cover packages/tokens
        # (vitest) and packages/shared (bun test) which the turbo @repo/web
        # filter above never reaches.
        run: bun run ci:tokens && bun run --cwd packages/tokens test && bun run --cwd packages/shared test

      - name: Build
        env:
          # Hermetic CI build (slice-28.4, audit #137): skip the
          # export-fallbacks prebuild — the committed content modules are the
          # content source and CI must not reach a live CMS. Declared in
          # turbo.json build env so turbo strict mode forwards it.
          EXPORT_FALLBACKS_SKIP: "1"
        run: bun x turbo run build --filter=@repo/web

  # ── E2E (Playwright) against a LOCAL hermetic preview ──────────────────────
  # Runs ENTIRELY on the runner: the playwright webServer builds with
  # EXPORT_FALLBACKS_SKIP=1 (committed content modules are the content source —
  # no CMS call) and serves on :4173; the suite hits localhost. ZERO Vercel edge
  # requests — no preview URL to resolve, no Deployment-Protection bypass, no
  # edge-quota burn (that burn was the reason e2e was throttled to manual-only).
  # The old reasons for targeting the deployed preview — the @resvg/resvg-js OG
  # native binary, a /projects SSR 500, and screenshot/font drift — are stale:
  # every route serves 200 under the local preview and there are no pixel-diff
  # assertions. CMS stays build-time-only, the deployed site never calls it.
  e2e:
    # PR-only: e2e runs on pull_request, NOT on push to main/develop. The
    # post-merge develop/main push used to re-run the 3 shards redundantly with
    # the PR run that already passed — pure GitHub Actions minute burn (the 3,000
    # free monthly minutes ran out mid-month once). ci + gitleaks still run on
    # push. OPTIONAL SWITCH: add the "skip-e2e" label to a PR to skip e2e
    # (docs-only, or to unblock a merge if the suite is misbehaving).
    if: >-
      ${{ github.event_name == 'pull_request'
          && !contains(github.event.pull_request.labels.*.name, 'skip-e2e') }}
    # Gate the 3 shards on the cheap ci job: its build populates the turbo
    # remote cache, so shards replay it instead of running 4 identical builds.
    needs: ci
    runs-on: ubuntu-latest
    # Shard across 3 runners. Each shard builds from the warm turbo remote cache
    # (the ci job's identical EXPORT_FALLBACKS_SKIP=1 build populates it), so the
    # per-shard build is a cache hit and only ~1/3 of the suite runs per runner.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      # Cache the Playwright browser binaries so the ~100MB Chromium download is
      # skipped on a cache hit. Keyed by the lockfile (changes on a @playwright
      # bump); the restore-key keeps the last good cache so a dep bump does not
      # force a full re-download.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (+ system deps)
        working-directory: apps/web
        run: bun x playwright install --with-deps chromium

      # Build via turbo (cache-eligible; shares the remote/local cache with the
      # ci job's build) so the Playwright webServer does NOT rebuild — it just
      # previews this output (E2E_PREBUILT). EXPORT_FALLBACKS_SKIP matches the ci
      # build so the turbo cache key lines up; the CMS is never contacted.
      - name: Build (turbo, cache-eligible)
        env:
          EXPORT_FALLBACKS_SKIP: "1"
        run: bun x turbo run build --filter=@repo/web

      - name: Playwright e2e (shard ${{ matrix.shard }}/3, local hermetic preview)
        working-directory: apps/web
        env:
          E2E_PREBUILT: "1"
        run: >-
          bun x playwright test
          --shard=${{ matrix.shard }}/3
          --reporter=blob

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: apps/web/blob-report/
          retention-days: 14

  # ── Merge the 3 shard blob reports into one HTML report ─────────────────────
  # needs: [e2e] + if: !cancelled() so it still merges when a shard fails (you
  # want the report most on a red build). Downloads every blob-report-* artifact
  # and merges to the single playwright-report/ path the old job published.
  e2e-merge-reports:
    # Skip when e2e itself was skipped (e.g. a push, where e2e is now PR-only) —
    # otherwise this would run with no blob reports to merge.
    if: ${{ !cancelled() && needs.e2e.result != 'skipped' }}
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: apps/web/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        working-directory: apps/web
        run: bun x playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: apps/web/playwright-report/
          retention-days: 14
