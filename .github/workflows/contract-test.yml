name: contract-test (intra-repo)

# Validates that apps/web's Directus adapter works against apps/cms's schema
# snapshot + seed. Catches adapter/schema drift that would break consumer
# rendering even with a green apps/cms smoke-apply.
#
# Monorepo pivot 2026-04-24: both apps live in yesid.dev now, so the test is
# intra-repo (single checkout). Previously was cross-repo with two checkouts.
#
# Opt-in on PRs via label `contract-test` to limit CI cost (heavy — spins
# Postgres + Directus + both app installs), or manual dispatch. The nightly
# cron was removed in slice-28.4 (audit #0/#44/#87): since slice-27.2 Directus
# is out of the SSR data path, so unattended drift cannot break prod — this
# venue exists for label-gated PR runs (slice-26 dormant-adapter parity work)
# and on-demand checks.
#
# Provisioning (slice-28.4 rewrite): the ephemeral Directus is provisioned
# from the directus-sync tree (apps/cms/directus/**) via
# `bun --cwd apps/cms run sync:push`, mirroring how cms.yml pushes to prod.
# The image is built from apps/cms/Dockerfile (Directus + directus-extension-sync
# at whatever versions the Dockerfile pins — the same image Railway runs; the
# extension is required for directus-sync's id-map endpoints). The previous step POSTed
# apps/cms/infra/directus/snapshot.yaml to /schema/apply — a path deleted
# when the directus-sync tree replaced the YAML snapshot, so the step was
# silently broken.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      # Widened to apps/web/src/lib/** (slice-18k cycle 5): the composer
      # parity tests in directus.contract.test.ts now import from
      # $lib/content/site-meta, $lib/content/site-seo-defaults, and
      # $lib/directus/assets in addition to the existing lib/adapters
      # surface. Future test additions in other lib/ subdirs will also
      # be covered automatically.
      - 'apps/web/src/lib/**'
      - 'apps/web/static/images/**'
      # directus-sync tree: schema snapshot + collections config (slice-28.4
      # fix — replaced the deleted apps/cms/infra/directus/snapshot.yaml path).
      - 'apps/cms/directus/**'
      - 'apps/cms/fixtures/**'
      # Watch the entire scripts tree (slice-18k cycle 6 briefed): migrate:assets
      # + seed:services + seed:projects all import from apps/cms/scripts/lib/*
      # (bottleneck, logger, sdk, auth, catch-error). A PR touching just a helper
      # would have skipped the workflow under the narrow per-script filter.
      - 'apps/cms/scripts/**'
      - 'packages/shared/**'
      - '.github/workflows/contract-test.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/SHA to test (default: PR head)'
        type: string
        required: false

jobs:
  contract-test:
    # PRs: only run when labeled `contract-test` (opt-in — heavy job).
    # Manual dispatch: always run.
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'contract-test')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: directus
          POSTGRES_PASSWORD: directus
          POSTGRES_DB: directus
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: ./.github/actions/setup

      - name: Build ephemeral Directus image (from apps/cms/Dockerfile, mirrors Railway)
        # directus-sync push needs the directus-extension-sync id-map endpoints
        # on the target instance — the stock directus/directus image lacks
        # them. apps/cms/Dockerfile is exactly the image Railway runs.
        run: docker build -t directus-ci apps/cms

      - name: Boot ephemeral Directus
        # v12 licensing: FRESH instances hard-enforce core-tier limits at
        # /schema/apply ("collections limit exceeded" — our tree is ~50
        # collections), unlike upgrades-in-place which get a 30-day grace.
        # Provide DIRECTUS_LICENSE_KEY (repo secret) once the Open Innovation
        # Grant key arrives; LICENSE_TOKEN (offline variant) is preferred for
        # CI if the grant tier issues one. Empty secret = keyless boot.
        env:
          LICENSE_KEY: ${{ secrets.DIRECTUS_LICENSE_KEY }}
        run: |
          EXTRA_ENV=()
          if [ -n "$LICENSE_KEY" ]; then
            EXTRA_ENV+=(-e "LICENSE_KEY=$LICENSE_KEY")
            echo "::notice::Booting with LICENSE_KEY from repo secret"
          else
            echo "::warning::No DIRECTUS_LICENSE_KEY secret — keyless core tier; /schema/apply will fail on collection limits for fresh v12 instances"
          fi
          docker run -d --name directus \
            "${EXTRA_ENV[@]}" \
            --add-host=host.docker.internal:host-gateway \
            -p 8055:8055 \
            -e KEY=ci-test-key-16-bytes-hex-aabbccdd \
            -e SECRET=ci-test-secret-32-bytes-hex-aabbccddeeff \
            -e PUBLIC_URL=http://localhost:8055 \
            -e DB_CLIENT=pg \
            -e DB_HOST=host.docker.internal \
            -e DB_PORT=5432 \
            -e DB_DATABASE=directus \
            -e DB_USER=directus \
            -e DB_PASSWORD=directus \
            -e ADMIN_EMAIL=admin@example.com \
            -e ADMIN_PASSWORD=ci-test-pass-rotate-immediately \
            -e TELEMETRY=false \
            -e LOG_LEVEL=info \
            directus-ci \
            sh -c "npx directus bootstrap && exec npx directus start"
          for i in {1..100}; do
            if curl -sf http://localhost:8055/server/ping >/dev/null 2>&1; then
              echo "::notice::Directus healthy after ${i} polls"
              break
            fi
            sleep 3
          done
          if ! curl -sf http://localhost:8055/server/ping >/dev/null 2>&1; then
            echo "::error::Health check timed out"
            docker logs --tail=200 directus
            exit 1
          fi

      - name: Provision schema + config from the directus-sync tree (mirrors cms.yml push)
        # Non-prod target (localhost) so sync-push.ts requires no prod acks;
        # the wrapper default-excludes the permissions collection — the
        # explicit grant step below provides Public read for the test surface.
        # NOTE: `bun --cwd apps/cms run <script>` mis-parses on bun 1.3.x
        # (prints usage) — use working-directory like cms.yml does.
        env:
          DIRECTUS_URL: http://localhost:8055
          DIRECTUS_ADMIN_EMAIL: admin@example.com
          DIRECTUS_ADMIN_PASSWORD: ci-test-pass-rotate-immediately
        working-directory: apps/cms
        # --force: the committed snapshot is stamped with the version it was
        # pulled from (currently 11.17.3) while the ephemeral image runs 12.0.0
        # — /schema/diff hard-rejects cross-version pushes without it. Safe
        # here (throwaway instance). Becomes a no-op once the post-flip
        # sync:pull re-stamps the snapshot at 12.x; never add this to cms.yml
        # prod pushes, where the version guard is protective.
        run: bun run sync:push -- --force

      - name: Grant Public policy read on services domain
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8055/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@example.com","password":"ci-test-pass-rotate-immediately"}' \
            | jq -r '.data.access_token')
          # Fresh v11+/v12 bootstraps name the default public policy
          # '$t:public_label' (a translation key); migrated instances (prod)
          # carry the literal 'Public'. Fetch all policies and match either —
          # and fail LOUD if neither exists, instead of POSTing policy:"" into
          # a uuid column (the silent-empty failure mode of run 27311875212).
          POLICIES=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            'http://localhost:8055/policies?fields=id,name&limit=-1')
          PUBLIC_POLICY_ID=$(echo "$POLICIES" \
            | jq -r '.data[] | select(.name == "Public" or .name == "$t:public_label") | .id' | head -1)
          if [ -z "$PUBLIC_POLICY_ID" ] || [ "$PUBLIC_POLICY_ID" = "null" ]; then
            echo "::error::No public policy found; policies present:"
            echo "$POLICIES" | jq -r '.data[].name'
            exit 1
          fi
          echo "::notice::Public policy resolved: $PUBLIC_POLICY_ID"
          for COLLECTION in services services_translations services_deliverables services_deliverables_translations services_sections services_sections_translations languages projects projects_translations projects_sections projects_sections_translations projects_impact_metrics projects_impact_metrics_translations projects_services; do
            curl -sf -X POST http://localhost:8055/permissions \
              -H "Authorization: Bearer $TOKEN" \
              -H 'Content-Type: application/json' \
              -d "{\"policy\":\"$PUBLIC_POLICY_ID\",\"collection\":\"$COLLECTION\",\"action\":\"read\",\"fields\":[\"*\"]}" >/dev/null
          done

      - name: Seed services from apps/cms fixture
        env:
          PUBLIC_DIRECTUS_URL: http://localhost:8055
          DIRECTUS_ADMIN_EMAIL: admin@example.com
          DIRECTUS_ADMIN_PASSWORD: ci-test-pass-rotate-immediately
        working-directory: apps/cms
        run: bun run seed:services

      - name: Migrate assets (uploads apps/web/static/images/* per assets-manifest, writes ephemeral UUIDs to assets-id-map.json — required before seed:projects can resolve hero_image_legacy_path)
        env:
          PUBLIC_DIRECTUS_URL: http://localhost:8055
          DIRECTUS_ADMIN_EMAIL: admin@example.com
          DIRECTUS_ADMIN_PASSWORD: ci-test-pass-rotate-immediately
        working-directory: apps/cms
        run: bun run migrate:assets

      - name: Seed projects from apps/cms fixture (slice-18k #43 — enables projects integration block; requires migrate:assets first for hero_image FK resolution)
        env:
          PUBLIC_DIRECTUS_URL: http://localhost:8055
          DIRECTUS_ADMIN_EMAIL: admin@example.com
          DIRECTUS_ADMIN_PASSWORD: ci-test-pass-rotate-immediately
        working-directory: apps/cms
        run: bun run seed:projects

      - name: Run apps/web adapter integration tests against ephemeral Directus
        env:
          PUBLIC_DIRECTUS_URL: http://localhost:8055
          RUN_DIRECTUS_INTEGRATION: '1'
        working-directory: apps/web
        run: |
          bun x svelte-kit sync
          bun run test src/lib/adapters/directus.integration.test.ts

      - name: Surface Directus logs on failure
        if: failure()
        run: docker logs --tail=200 directus
