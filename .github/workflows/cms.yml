name: cms

# CI for apps/cms (Directus config → Railway).
#
# Task 22 (post-21): replaced curl-based /schema/diff + /schema/apply with
# `bun run sync:diff` / `bun run sync:push` — directus-sync CLI backed by
# directus-extension-sync@3.0.6 on the Railway Directus image.
#
# Jobs:
# - test (always): apps/cms unit tests (no network).
# - diff (PR): read-only preview of what sync:push WOULD apply. Against
#   prod. Never writes.
# - push (workflow_dispatch with action=push): applies the JSON tree to
#   cms.yesid.dev. Gated behind production environment for operator review.
# - permission-control-audit (workflow_dispatch): GET-only semantic comparison
#   of the repository permission declaration with production.
# - permission-policy-candidate-diagnostic (workflow_dispatch): GET-only
#   candidate evidence when a desired policy name is duplicated in production.
# - public-blog-translation-key-repair (workflow_dispatch): audits, applies one
#   guarded fields-only permission repair, then audits again.
#
# slice-17f Phase 7: shared setup extracted to .github/actions/setup
# (Bun + cache restores + install). concurrency cancel-in-progress on
# pull_request kills duplicate runs on force-push / fast follow-up commits.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   DIRECTUS_PROD_ADMIN_TOKEN      = static admin token (cms.yesid.dev/admin →
#                                    User Profile → Token → Generate). Bypasses
#                                    OTP — required since admin enrolled 2FA in
#                                    slice 18j (2026-04-30).
# DIRECTUS_URL is hardcoded (public domain — not a secret).
#
# Source: Notion slice-18 plan, Phase 2 Task 22.

on:
  # slice-17f Phase 8: path filters removed (test/diff jobs are required
  # status checks on main; required checks must always run or the merge
  # gate hangs on docs-only PRs). Phase 7 caches make no-op runs cheap.
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: diff preview, push config apply, legal notice remediation, read-only permission audit, candidate diagnostic, or targeted blog repair'
        type: choice
        options: [diff, push, legal-service-area, permission-control-audit, permission-policy-candidate-diagnostic, public-blog-translation-key-repair]
        default: diff
        required: true
      include_permissions:
        description: 'Include directus_permissions collection in push (dangerous; default false)'
        type: boolean
        default: false
        required: false

# Cancel in-progress duplicate runs on PR pushes; let main/develop pushes
# AND workflow_dispatch (which may apply to prod) run to completion.
concurrency:
  group: cms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Run apps/cms unit tests (fixtures + seed dry-runs + sync-push + lib)
        working-directory: apps/cms
        run: bun test

      # Schema codegen drift check removed in slice-28.3 (#78): the generated
      # packages/shared/src/types/directus-schema.ts had zero consumers, and
      # this step hit the prod CMS on every test run. The generator
      # (apps/cms/scripts/generate-types.ts) was deleted with it.

  diff:
    # Preview what sync:push WOULD apply. Main-bound PR checks + explicit diff dispatch.
    # Develop PRs run unit tests only; prod diff is too noisy while dev CMS work is active.
    # Never writes — the `diff` subcommand is read-only.
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'diff')
    runs-on: ubuntu-latest
    needs: test
    env:
      DIRECTUS_URL: https://cms.yesid.dev
      DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: sync:diff — preview diff vs prod
        working-directory: apps/cms
        run: bun run sync:diff

  push:
    # Apply apps/cms/directus/**.json to cms.yesid.dev. workflow_dispatch only.
    # Gated by environment:production for operator review. WARN: schema/
    # permissions/flows changes can affect live content — review diff first.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'push'
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      DIRECTUS_URL: https://cms.yesid.dev
      DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: sync:push — apply to production
        working-directory: apps/cms
        env:
          DIRECTUS_SYNC_ALLOW_PROD_SCHEMA_PUSH: '1'
          DIRECTUS_SYNC_PUSH_ACK: sync-push-can-delete-cms-data
          DIRECTUS_SYNC_INCLUDE_PERMISSIONS: ${{ inputs.include_permissions && '1' || '' }}
          DIRECTUS_SYNC_PERMISSIONS_ACK: ${{ inputs.include_permissions && 'permissions-push-can-delete-parallel-work' || '' }}
        run: bun run sync:push

  legal-service-area:
    # P0 privacy remediation for the three localized legal-notice bodies. The
    # script accepts only the immutable pre-remediation body hashes or the
    # already-converged bodies, sends body-only PATCHes, and rereads every row.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'legal-service-area'
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Preview guarded legal service-area remediation
        working-directory: apps/cms
        run: bun scripts/reconcile-legal-service-area.ts --target=prod --dry-run

      - name: Apply and verify guarded legal service-area remediation
        working-directory: apps/cms
        run: >-
          bun scripts/reconcile-legal-service-area.ts
          --target=prod
          --apply
          --confirm=APPLY_PROD_LEGAL_SERVICE_AREA

      - name: Prove legal service-area convergence
        working-directory: apps/cms
        run: bun scripts/reconcile-legal-service-area.ts --target=prod --dry-run

      - name: Regenerate legal module from authenticated live production CMS
        working-directory: apps/cms
        env:
          EXPORT_FALLBACKS_LIVE: '1'
          VERCEL_ENV: production
          PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
        run: bun scripts/export-fallbacks.ts --module=legal-pages

      - name: Verify generated-content integrity
        run: bun apps/cms/scripts/verify-content-manifest.ts

      - name: Upload authenticated legal export
        uses: actions/upload-artifact@v4
        with:
          name: legal-service-area-live-export-${{ github.run_id }}
          path: |
            apps/web/src/lib/content/legal-pages.ts
            apps/web/src/lib/content/generated.manifest.json
          if-no-files-found: error
          retention-days: 1

  permission-control-audit:
    # Read-only semantic comparison by policy name + collection + action. This
    # job cannot invoke either a permission reconciler or directus-sync.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'permission-control-audit' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Audit production Directus permissions semantically (read-only)
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run

  permission-policy-candidate-diagnostic:
    # GET-only evidence for every live candidate sharing a desired policy name.
    # The script prints role labels and direct-user role labels, never user PII,
    # and cannot invoke a reconciler or directus-sync.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'permission-policy-candidate-diagnostic' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Diagnose duplicate desired-policy candidates (read-only)
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/diagnose-permission-policy-candidates.ts --target=prod --dry-run

  public-blog-translation-key-repair:
    # One targeted public blog_posts:read fields repair. The reconciler refuses
    # duplicate rows, unrelated drift, and any PATCH body beyond fields.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'public-blog-translation-key-repair' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Audit production permissions before targeted repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run

      - name: Preview public blog translation_key permission repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/reconcile-public-blog-permission.ts --target=prod --dry-run

      - name: Apply and verify public blog translation_key permission repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: >-
          bun scripts/reconcile-public-blog-permission.ts
          --target=prod
          --apply
          --confirm=APPLY_PROD_PUBLIC_BLOG_TRANSLATION_KEY_PERMISSION

      - name: Audit production permissions after targeted repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run --require-converged
