name: cms

# CI for apps/cms (Directus config → Railway).
#
# Task 22 (post-21): replaced curl-based /schema/diff + /schema/apply with
# `bun run sync:diff` / `bun run sync:push` — directus-sync CLI backed by
# directus-extension-sync@3.0.6 on the Railway Directus image.
#
# Jobs:
# - test-work (PR/dispatch): apps/cms unit tests plus the offline asset-audit
#   regression gate (no network or CMS credentials).
# - test (always): required-check reporter; main pushes reuse the merged PR gate.
# - diff (main PR): required credential-free validation of the committed
#   Directus snapshot contracts. Offline; never receives CMS credentials.
# - live-diff (push to main or main-only diff dispatch): read-only preview of
#   what sync:push WOULD apply against prod, from trusted main code only.
# - push (workflow_dispatch with action=push): applies the JSON tree to
#   cms.yesid.dev. Gated behind production environment for operator review.
# - permission-control-audit (workflow_dispatch): GET-only semantic comparison
#   of the repository permission declaration with production.
# - permission-policy-candidate-diagnostic (workflow_dispatch): GET-only
#   candidate evidence when a desired policy name is duplicated in production.
#   Its policy aliases are informational only; the quarantine reconciler's raw
#   /access query is the sole attachment-topology authority.
# - permission-policy-quarantine-preview / rename (workflow_dispatch): guarded
#   preview or name-only quarantine rename for one proven duplicate policy.
# - public-blog-translation-key-repair (workflow_dispatch): audits, applies one
#   guarded fields-only permission repair, then audits again.
#
# slice-17f Phase 7: shared setup extracted to .github/actions/setup
# (Bun + cache restores + install). concurrency cancel-in-progress on
# pull_request kills duplicate runs on force-push / fast follow-up commits.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   DIRECTUS_PROD_ADMIN_TOKEN      = static admin token (cms.yesid.dev/admin →
#                                    User Profile → Token → Generate). Bypasses
#                                    OTP — required since admin enrolled 2FA in
#                                    slice 18j (2026-04-30).
# DIRECTUS_URL is hardcoded (public domain — not a secret).
#
# Source: Notion slice-18 plan, Phase 2 Task 22.

on:
  # slice-17f Phase 8: path filters removed (test/diff jobs are required
  # status checks on main; required checks must always run or the merge
  # gate hangs on docs-only PRs). Phase 7 caches make no-op runs cheap.
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: diff preview, push config apply, legal notice remediation, guarded analytics-controls promotion, read-only permission audit, candidate diagnostic, quarantine preview or rename, or targeted blog repair'
        type: choice
        options: [diff, push, legal-service-area, analytics-controls, permission-control-audit, permission-policy-candidate-diagnostic, permission-policy-quarantine-preview, permission-policy-quarantine-rename, public-blog-translation-key-repair]
        default: diff
        required: true
      include_permissions:
        description: 'Include directus_permissions collection in push (dangerous; default false)'
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  pull-requests: read

# Cancel in-progress duplicate runs on PR pushes; let main pushes
# AND workflow_dispatch (which may apply to prod) run to completion.
concurrency:
  group: cms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      classification: ${{ steps.classify.outputs.classification }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: mgkdante/yesid.dev-design/.github/actions/classify-paths@a4e9d0e3b42da8121b5e9f98de2e315ad48e8f25
        id: classify
        with:
          github-token: ${{ github.token }}
          rules-json: >-
            {
              "schema": 1,
              "always": {
                "paths": [".bun-version", ".github/scripts/materialize-shared-config.mjs", ".github/shared-tooling.json", ".github/workflows/cms.yml", ".npmrc", "bun.lock", "package.json", "turbo.json"],
                "prefixes": [".github/actions/", ".github/scripts/", ".github/shared-tooling/", ".github/workflows/"]
              },
              "jobs": {
                "test-work": {
                  "paths": [".claude/hooks/pretool-block-generated-ts.sh", ".githooks/pre-commit"],
                  "prefixes": ["apps/cms/", "apps/web/", "gbp-assets/", "packages/"]
                }
              },
              "ignore": {
                "docs-only": {
                  "paths": ["AGENTS.md", "CLAUDE.md", "CODE_OF_CONDUCT.md", "CONTRIBUTING.md", "LICENSE", "README.md", "SECURITY.md", "SUPPORT.md", "THIRD_PARTY_NOTICES.md"],
                  "prefixes": ["docs/"]
                },
                "irrelevant": {
                  "paths": [".env.1password", ".env.example", ".gitattributes", ".gitignore", ".gitleaks.toml", ".gitleaksignore", ".mcp.json", "DESIGN.md"],
                  "prefixes": [".claude/", ".codex/", ".githooks/"]
                }
              }
            }

  test-work:
    needs: [classify]
    if: ${{ github.event_name != 'push' && fromJSON(needs.classify.outputs.classification).relevant['test-work'] }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: Run apps/cms unit tests (fixtures + seed dry-runs + sync-push + lib)
        working-directory: apps/cms
        run: bun test

      - name: Verify asset audit baseline (offline, no CMS)
        working-directory: apps/cms
        run: bun run verify:assets-audit

      # Schema codegen drift check removed in slice-28.3 (#78): the generated
      # packages/shared/src/types/directus-schema.ts had zero consumers, and
      # this step hit the prod CMS on every test run. The generator
      # (apps/cms/scripts/generate-types.ts) was deleted with it.

  test:
    name: test
    needs: [classify, test-work]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Preserve trusted main-push dependency
        if: ${{ github.event_name == 'push' }}
        run: ':'

      - uses: mgkdante/yesid.dev-design/.github/actions/required-context@a4e9d0e3b42da8121b5e9f98de2e315ad48e8f25
        if: ${{ github.event_name != 'push' }}
        with:
          needs-json: ${{ toJSON(needs) }}

  diff:
    # Keep the required main-PR `diff` status without exposing production.
    # The full test job already runs this contract; repeating the narrow suite
    # preserves the branch-rule check name while staying offline and secret-free.
    if: |
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: Validate committed Directus snapshot contracts (offline, no CMS)
        working-directory: apps/cms
        run: bun test tests/snapshot-contract.test.ts

  live-diff:
    # The live comparison needs the production API, so it runs only after main
    # is trusted: immediately post-merge or by an explicit dispatch from main.
    if: |
      !cancelled() &&
      needs.test.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'diff'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    env:
      DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: sync:diff — preview diff vs prod
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun run sync:diff

  push:
    # Apply apps/cms/directus/**.json to cms.yesid.dev. workflow_dispatch only.
    # Gated by environment:production for operator review. WARN: schema/
    # permissions/flows changes can affect live content — review diff first.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      DIRECTUS_URL: https://cms.yesid.dev
      DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: sync:push — apply to production
        working-directory: apps/cms
        env:
          DIRECTUS_SYNC_ALLOW_PROD_SCHEMA_PUSH: '1'
          DIRECTUS_SYNC_PUSH_ACK: sync-push-can-delete-cms-data
          DIRECTUS_SYNC_INCLUDE_PERMISSIONS: ${{ inputs.include_permissions && '1' || '' }}
          DIRECTUS_SYNC_PERMISSIONS_ACK: ${{ inputs.include_permissions && 'permissions-push-can-delete-parallel-work' || '' }}
        run: bun run sync:push

  legal-service-area:
    # P0 privacy remediation for the three localized legal-notice bodies. The
    # script accepts only the immutable pre-remediation body hashes or the
    # already-converged bodies, sends body-only PATCHes, and rereads every row.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'legal-service-area' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: Preview guarded legal service-area remediation
        working-directory: apps/cms
        run: bun scripts/reconcile-legal-service-area.ts --target=prod --dry-run

      - name: Apply and verify guarded legal service-area remediation
        working-directory: apps/cms
        run: >-
          bun scripts/reconcile-legal-service-area.ts
          --target=prod
          --apply
          --confirm=APPLY_PROD_LEGAL_SERVICE_AREA

      - name: Prove legal service-area convergence
        working-directory: apps/cms
        run: bun scripts/reconcile-legal-service-area.ts --target=prod --dry-run

      - name: Regenerate legal module from authenticated live production CMS
        working-directory: apps/cms
        env:
          EXPORT_FALLBACKS_LIVE: '1'
          VERCEL_ENV: production
          PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
        run: bun scripts/export-fallbacks.ts --module=legal-pages

      - name: Verify generated-content integrity
        run: bun apps/cms/scripts/verify-content-manifest.ts

      - name: Upload authenticated legal export
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: legal-service-area-live-export-${{ github.run_id }}
          path: |
            apps/web/src/lib/content/legal-pages.ts
            apps/web/src/lib/content/generated.manifest.json
          if-no-files-found: error
          retention-days: 1

  permission-control-audit:
    # Read-only semantic comparison by policy name + collection + action. This
    # job cannot invoke either a permission reconciler or directus-sync.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'permission-control-audit' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: Audit production Directus permissions semantically (read-only)
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run

  permission-policy-candidate-diagnostic:
    # GET-only evidence for every live candidate sharing a desired policy name.
    # The script prints role labels and direct-user role labels, never user PII,
    # and cannot invoke a reconciler or directus-sync.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'permission-policy-candidate-diagnostic' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: Diagnose duplicate desired-policy candidates (read-only)
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/diagnose-permission-policy-candidates.ts --target=prod --dry-run

  permission-policy-quarantine-rename:
    # Guarded name-only reconciliation for one immutable policy id. The script
    # refuses effective-access flags, permissions, unexpected name topology,
    # or any raw access-row change. Preview dispatch cannot reach write steps.
    if: |
      github.event_name == 'workflow_dispatch' &&
      (
        github.event.inputs.action == 'permission-policy-quarantine-preview' ||
        github.event.inputs.action == 'permission-policy-quarantine-rename'
      ) &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: Preview guarded duplicate-policy quarantine rename
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/reconcile-permission-policy-quarantine-name.ts --target=prod --dry-run

      - name: Apply and verify guarded duplicate-policy quarantine rename
        if: github.event.inputs.action == 'permission-policy-quarantine-rename'
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: >-
          bun scripts/reconcile-permission-policy-quarantine-name.ts
          --target=prod
          --apply
          --confirm=APPLY_PROD_PERMISSION_POLICY_QUARANTINE_RENAME

      - name: Prove duplicate-policy quarantine rename read-back
        if: github.event.inputs.action == 'permission-policy-quarantine-rename'
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/reconcile-permission-policy-quarantine-name.ts --target=prod --dry-run

      - name: Audit all production Directus permissions after rename (read-only)
        if: github.event.inputs.action == 'permission-policy-quarantine-rename'
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run

  public-blog-translation-key-repair:
    # One targeted public blog_posts:read fields repair. The reconciler refuses
    # duplicate rows, unrelated drift, and any PATCH body beyond fields.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'public-blog-translation-key-repair' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      - name: Audit production permissions before targeted repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run

      - name: Preview public blog translation_key permission repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/reconcile-public-blog-permission.ts --target=prod --dry-run

      - name: Apply and verify public blog translation_key permission repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: >-
          bun scripts/reconcile-public-blog-permission.ts
          --target=prod
          --apply
          --confirm=APPLY_PROD_PUBLIC_BLOG_TRANSLATION_KEY_PERMISSION

      - name: Audit production permissions after targeted repair
        working-directory: apps/cms
        env:
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run --require-converged

  analytics-controls:
    # slice-40.1 Stage D: guarded SCOPED promotion of the CMS analytics
    # controls to production — three narrow lanes (schema fields, revalidate
    # flow, lean content), each dry-run → apply → converge read-back. Never a
    # broad push. Owner directive 2026-07-16: flags land true/true (explicit-
    # consent banner mode); hidden/no-banner mode stays unapproved and inert;
    # EFVP + NEQ are deferred to pre-deploy day as a hard pre-campaign gate.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'analytics-controls' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    environment:
      name: production
      url: https://cms.yesid.dev
    env:
      DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_PROD_ADMIN_TOKEN }}
      DIRECTUS_URL: https://cms.yesid.dev
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup

      # Pre-existing drift ('Ops Bot content ops' duplicate) may legitimately
      # appear here; the post-promotion audit must show no NEW drift vs this
      # baseline log. Non-blocking by design.
      - name: Baseline permission-control drift audit (read-only)
        working-directory: apps/cms
        continue-on-error: true
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run

      - name: Preflight scoped diff (expect 2 analytics field creates, 1 flow update, zero deletions)
        working-directory: apps/cms
        run: bun run sync:diff

      - name: Schema lane — apply snapshot only (2 field creates)
        working-directory: apps/cms
        env:
          DIRECTUS_SYNC_ALLOW_PROD_SCHEMA_PUSH: '1'
          DIRECTUS_SYNC_PUSH_ACK: sync-push-can-delete-cms-data
        run: bun run sync:push -- --no-collections

      - name: Flow lane — apply flows collection only (revalidate flow gains site_labels)
        working-directory: apps/cms
        env:
          DIRECTUS_SYNC_ALLOW_PROD_SCHEMA_PUSH: '1'
          DIRECTUS_SYNC_PUSH_ACK: sync-push-can-delete-cms-data
        run: bun run sync:push -- --no-snapshot --only-collections flows

      - name: Converge read-back — scoped diff must show no snapshot/flow changes
        working-directory: apps/cms
        run: bun run sync:diff

      - name: Assert prod analytics flags are true/true (owner flag-preservation proof)
        run: >-
          curl -fsS -H "Authorization: Bearer ${DIRECTUS_ADMIN_TOKEN}"
          "${DIRECTUS_URL}/items/site_labels?fields=analytics_enabled,analytics_consent_show_banner"
          | bun -e 'const d=await new Response(Bun.stdin.stream()).json();
          if (d.data?.analytics_enabled !== true || d.data?.analytics_consent_show_banner !== true)
          { console.error("FLAG ASSERTION FAILED:", JSON.stringify(d.data)); process.exit(1); }
          console.log("flags true/true confirmed");'

      - name: Content lane — dry-run (archived as the pre-apply row snapshot)
        working-directory: apps/cms
        run: |
          set -o pipefail
          bun scripts/promote-lean-high-intent-analytics.ts --target=prod --dry-run | tee /tmp/lean-pre-apply.log

      - name: Content lane — apply with confirm token
        working-directory: apps/cms
        run: >-
          bun scripts/promote-lean-high-intent-analytics.ts
          --target=prod
          --apply
          --confirm=APPLY_PROD_LEAN_HIGH_INTENT_ANALYTICS

      - name: Content lane — converge (dry-run must report no changes)
        working-directory: apps/cms
        run: bun scripts/promote-lean-high-intent-analytics.ts --target=prod --dry-run

      - name: Legal service-area convergence spot-check (read-only)
        working-directory: apps/cms
        run: bun scripts/reconcile-legal-service-area.ts --target=prod --dry-run

      - name: Post-promotion permission-control drift audit (compare to baseline)
        working-directory: apps/cms
        continue-on-error: true
        run: bun scripts/audit-permission-control-drift.ts --target=prod --dry-run

      - name: Regenerate site-labels module from authenticated live production CMS
        working-directory: apps/cms
        env:
          EXPORT_FALLBACKS_LIVE: '1'
          VERCEL_ENV: production
          PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
        run: bun scripts/export-fallbacks.ts --module=site-labels

      - name: Regenerate legal-pages module from authenticated live production CMS
        working-directory: apps/cms
        env:
          EXPORT_FALLBACKS_LIVE: '1'
          VERCEL_ENV: production
          PUBLIC_DIRECTUS_URL: https://cms.yesid.dev
        run: bun scripts/export-fallbacks.ts --module=legal-pages

      - name: Verify generated-content integrity
        run: bun apps/cms/scripts/verify-content-manifest.ts

      - name: Upload authenticated live export + pre-apply snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: analytics-controls-live-export-${{ github.run_id }}
          path: |
            apps/web/src/lib/content/site-labels.ts
            apps/web/src/lib/content/legal-pages.ts
            apps/web/src/lib/content/generated.manifest.json
            /tmp/lean-pre-apply.log
          if-no-files-found: error
          retention-days: 7
