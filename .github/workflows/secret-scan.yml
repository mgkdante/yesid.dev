name: secret-scan

# Gitleaks secret scanning across the monorepo.
# Runs on PR, push to main, and weekly cron (catches drift from history edits).
# Config: .gitleaks.toml at repo root (extends default rules + allowlists known
# CI test credentials hardcoded in workflow files).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 05:00 UTC — low-traffic window.
    - cron: '0 5 * * 1'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for scheduled scans; shallow for PR/push is sufficient.
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 1 }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use repo-root .gitleaks.toml (extends default rules + our allowlist).
          GITLEAKS_CONFIG: .gitleaks.toml
