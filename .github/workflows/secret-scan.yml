name: secret-scan

# Gitleaks secret scanning across the monorepo.
# Runs on PR, push to main/develop, and weekly cron (catches drift from history edits).
# Config: .gitleaks.toml at repo root (extends default rules + allowlists known
# CI test credentials hardcoded in workflow files).
#
# Uses the gitleaks CLI binary directly (free, OSS) instead of the gitleaks-action
# wrapper, which requires a paid license for org-owned repos as of action v2.
# See: https://github.com/gitleaks/gitleaks-action#-announcement

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly Monday 05:00 UTC — low-traffic window.
    - cron: '0 5 * * 1'

env:
  GITLEAKS_VERSION: '8.21.2'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required: gitleaks scans commit ranges via --log-opts
          # for push/PR events, which fails with shallow clones.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan (pull_request - commit range only)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --log-opts="origin/${{ github.base_ref }}..HEAD"

      - name: Scan (push - last commit only)
        if: github.event_name == 'push'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --log-opts="${{ github.event.before }}..${{ github.event.after }}"

      - name: Scan (schedule - full history)
        if: github.event_name == 'schedule'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose
